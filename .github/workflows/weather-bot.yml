name: Weather Bot Trading Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run Weather Bot
      env:
        POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
        POLYMARKET_API_SECRET: ${{ secrets.POLYMARKET_API_SECRET }}
        POLYMARKET_PASSPHRASE: ${{ secrets.POLYMARKET_PASSPHRASE }}
        POLYGON_PRIVATE_KEY: ${{ secrets.POLYGON_PRIVATE_KEY }}
        WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
      run: |
        python weather_bot.py
    
    - name: Upload trade logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trade-logs-${{ github.run_id }}
        path: weather_bot.db
        retention-days: 7
